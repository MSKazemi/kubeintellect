# ─────────────────────────────────────────────────────────────────────────────
# log-pipeline.conf — Single source of truth for all KubeIntellect log tools.
#
# Sourced by:   scripts/dev/log-watcher.sh
#               scripts/dev/log-analyzer.sh
# Referenced by: .claude/skills/analyze-kubeintellect-logs/SKILL.md
#
# Edit this file to change detection rules, LLM prompts, or thresholds.
# Changes propagate automatically to all three entry points.
# ─────────────────────────────────────────────────────────────────────────────

# ── Target cluster / workload ─────────────────────────────────────────────────
LOG_NAMESPACE="kubeintellect"
LOG_DEPLOYMENT="kubeintellect-core"

# ── Thresholds ────────────────────────────────────────────────────────────────
SILENCE_TIMEOUT=15         # log-watcher: seconds of no new lines = end of request (primary flush is pattern-based; this is fallback only)
MIN_LINES_FOR_ANALYSIS=5   # log-watcher: skip trivial bursts below this count
COOLDOWN_SECONDS=300       # log-analyzer: minimum seconds between LLM calls
TAIL_LINES_HOOK=500        # log-analyzer: lines to fetch per Stop-hook run
TAIL_LINES_FIRST_RUN=100   # log-analyzer: lines to fetch when no cursor exists yet
TAIL_LINES_SKILL=500       # skill (/analyze-kubeintellect-logs): default --tail value
MAX_GREP_ISSUES=40         # log-analyzer: max extracted issue lines sent to LLM

# ── Detection patterns (ERE, used with grep -E) ───────────────────────────────
# Lines matching ISSUE_PATTERN are considered worth analyzing (Python-level errors).
ISSUE_PATTERN="ERROR|CRITICAL|Traceback|Exception:|WARNING"

# Lines matching SEMANTIC_PATTERN are KubeIntellect-specific behavioral signals.
# These are INFO-level and would be missed by ISSUE_PATTERN alone.
# Used by the skill (Step 2) and threaded into watcher prompts.
SEMANTIC_PATTERN="next=|I don't have|no tools|cannot perform|cap_tools_to_limit|clarification"

# Lines matching NOISE_PATTERN are filtered out even if they match ISSUE_PATTERN.
NOISE_PATTERN="DeprecationWarning|ResourceWarning"

# ── Roadmap item format ───────────────────────────────────────────────────────
# These strings are interpolated into LLM prompts to enforce a consistent
# format for all items written to docs/ROADMAP.md.
ROADMAP_ITEM_FORMAT='- [ ] **Short imperative title** — one sentence: what + why.
  - Observed: exact log excerpt or pattern (with count if repeated)
  - Fix: specific file path and function/line to change, and what to change'

ROADMAP_BAD_EXAMPLES='Never create items like: "Improve routing", "Fix agent errors", "Add more tools" — too vague, no file reference, no concrete action.'

# ── Shared system context (preamble for all LLM prompts) ─────────────────────
PROMPT_SYSTEM_CONTEXT="You are a senior Kubernetes platform engineer reviewing logs from KubeIntellect — an AI-powered Kubernetes management system built with LangGraph, FastAPI, and the Kubernetes Python client.

KubeIntellect agent names (used in routing decisions):
  Supervisor, Logs, Configs, RBAC, Metrics, Security, Lifecycle, Execution,
  Deletion, AdvancedOps, DynamicToolsExecutor, CodeGenerator, Apply

Key source files for routing fixes:
  - Routing logic:      app/orchestration/routing.py
  - Tool aggregation:   app/agents/tools/kubernetes_tools.py
  - Supervisor prompt:  app/orchestration/routing.py (create_supervisor_chain)

Known-bad routing patterns (use these as negative examples when analyzing):
  - 'next=DynamicToolsExecutor' for namespace queries → wrong; correct agent is AdvancedOps
    (fix: verify list_kubernetes_namespaces is in k8s_advancedops_tools in kubernetes_tools.py)
  - Same agent appearing >2 times in one turn → routing loop
    (fix: check MAX_CLARIFICATIONS in state.py and clarification detection in routing.py)
  - Agent response containing 'I don't have' or 'no tools' → capability miss
    (fix: add the missing tool to the agent's tool list in kubernetes_tools.py)"

# ── LLM prompt: watcher mode (full request-cycle buffer) ─────────────────────
# {BUFFER} is replaced at runtime with the actual log lines for that request.
# log-watcher.sh uses a Python one-liner to do the substitution safely.
read -r -d '' PROMPT_WATCHER_TEMPLATE << 'WATCHER_PROMPT_EOF'
{SYSTEM_CONTEXT}

These are the logs from one user interaction:
---
{BUFFER}
---

Tasks:
1. Briefly summarize what the user asked and what happened (1-2 sentences).
2. Identify any bugs, errors, or unexpected behavior visible in these logs.
   Also watch for these KubeIntellect-specific semantic signals (grep pattern: {SEMANTIC_PATTERN}):
   - `next=<AgentName>` lines: routing decisions — flag unexpected agent choices or the same agent >2 times
   - `I don't have` / `no tools` / `cannot perform`: agent capability miss — wrong routing or missing tool
   - `cap_tools_to_limit`: tool count approaching the 128-tool OpenAI limit
   - `clarification` appearing multiple times in one turn: clarification spiral
3. Suggest 0-3 concrete improvements (specific to this codebase — not generic advice).
   Always name the exact file and function to change.

Format your response as:

**Summary:** <one sentence>

**Issues found:** <bullet list, or "None">

**Improvement ideas:** <use this exact format for each item, or "None">
{ROADMAP_ITEM_FORMAT}

Only suggest improvements if something genuinely stands out.
If no meaningful issues are found, return exactly: NO_ISSUES
WATCHER_PROMPT_EOF

# ── LLM prompt: analyzer mode (grepped issues only) ───────────────────────────
# {ISSUES} is replaced at runtime with the grep-filtered error/warning lines.
# log-analyzer.sh uses a Python one-liner to do the substitution safely.
read -r -d '' PROMPT_ANALYZER_TEMPLATE << 'ANALYZER_PROMPT_EOF'
{SYSTEM_CONTEXT}

Recent log issues (errors/warnings and semantic signals):
---
{ISSUES}
---

Task:
1. Identify concrete bugs or failure modes visible in these logs.
   Pay special attention to KubeIntellect-specific signals:
   - `next=<AgentName>`: routing decisions — flag wrong-agent routing
   - `I don't have` / `no tools` / `cannot perform`: agent capability miss
   - `cap_tools_to_limit`: tool count limit approaching
   - Same agent repeated >2 times: routing loop
2. Suggest 1-3 actionable improvements (not generic advice — name the exact file and function).
3. Return ONLY markdown bullet points in this exact format (no intro, no conclusion):

{ROADMAP_ITEM_FORMAT}

{ROADMAP_BAD_EXAMPLES}

If no meaningful issues are found, return exactly: NO_ISSUES
ANALYZER_PROMPT_EOF
