{{- if .Values.externalSecrets.enabled }}
---
# ExternalSecret — MongoDB root password
# PRE-REQUISITE: store secret MONGO-ROOT-PASSWORD in Azure Key Vault before first deploy.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mongodb-secret
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "kubeintellect.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: azure-kv-store
    kind: SecretStore
  target:
    name: mongodb-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: MONGO-ROOT-PASSWORD
---
# ExternalSecret — kubeintellect core app
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kubeintellect-core-secret
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "kubeintellect.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: azure-kv-store
    kind: SecretStore
  target:
    name: kubeintellect-core-secret
    creationPolicy: Owner
  data:
    - secretKey: AZURE_OPENAI_API_KEY
      remoteRef:
        key: AZURE-OPENAI-API-KEY
    - secretKey: LANGCHAIN_API_KEY
      remoteRef:
        key: LANGCHAIN-API-KEY
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: POSTGRES-PASSWORD
---
# ExternalSecret — PostgreSQL
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-secret
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "kubeintellect.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: azure-kv-store
    kind: SecretStore
  target:
    name: postgres-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: POSTGRES-PASSWORD
---
# ExternalSecret — LibreChat
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: librechat-secret
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "kubeintellect.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: azure-kv-store
    kind: SecretStore
  target:
    name: librechat-secret
    creationPolicy: Owner
  data:
    - secretKey: KUBEINTELLECT_API_KEY
      remoteRef:
        key: KUBEINTELLECT-API-KEY
    - secretKey: MEILI_MASTER_KEY
      remoteRef:
        key: MEILI-MASTER-KEY
    - secretKey: JWT_SECRET
      remoteRef:
        key: JWT-SECRET
    - secretKey: JWT_REFRESH_SECRET
      remoteRef:
        key: JWT-REFRESH-SECRET
    - secretKey: CREDS_KEY
      remoteRef:
        key: CREDS-KEY
    - secretKey: CREDS_IV
      remoteRef:
        key: CREDS-IV
    # Full authenticated MongoDB URI — includes password so it cannot live in a ConfigMap.
    # Format: mongodb://mongouser:<password>@mongodb:27017/LibreChat?authSource=admin
    # PRE-REQUISITE: store MONGO-URI in Azure Key Vault before first deploy.
    - secretKey: MONGO_URI
      remoteRef:
        key: MONGO-URI
---
# ExternalSecret — Docker registry credentials (ghcr.io)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-creds
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "kubeintellect.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: azure-kv-store
    kind: SecretStore
  target:
    name: ghcr-creds
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"{{ `{{ .username }}` }}","password":"{{ `{{ .pat }}` }}","auth":"{{ `{{ printf "%s:%s" .username .pat | b64enc }}` }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: GHCR-USERNAME
    - secretKey: pat
      remoteRef:
        key: GHCR-PAT
{{- end }}
