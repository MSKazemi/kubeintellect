{{/* templates/deployments.yaml */}}
{{- $ns := .Values.namespace | default .Release.Namespace -}}

{{/* Normalize serviceAccount: allow string or map */}}
{{- $g := dict "sa" "default" -}}
{{- $saVal := get .Values "serviceAccount" -}}
{{- if and $saVal (kindIs "map" $saVal) -}}
  {{- $_ := set $g "sa" ((get $saVal "name") | default "default") -}}
{{- else if and $saVal (kindIs "string" $saVal) -}}
  {{- $_ := set $g "sa" $saVal -}}
{{- end -}}

{{- $globalProbes := (get .Values "probes") | default dict -}}

{{- range $app := (.Values.apps | default (list)) }}
{{- if ($app.enabled | default true) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ required "apps[].name is required" $app.name | quote }}
  namespace: {{ $ns | quote }}
  labels:
{{ toYaml ($app.labels | default (dict "app" $app.name)) | nindent 4 }}
  {{- with $app.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not (and $.Values.hpa.enabled (eq $app.name "kubeintellect-core")) }}
  replicas: {{ $app.replicas | default 1 }}
  {{- end }}
  revisionHistoryLimit: {{ $app.revisionHistoryLimit | default 10 }}
  progressDeadlineSeconds: {{ $app.progressDeadlineSeconds | default 600 }}
  selector:
    matchLabels:
{{ toYaml ($app.labels | default (dict "app" $app.name)) | nindent 6 }}
  {{- with $app.strategy }}
  strategy:
{{ toYaml . | nindent 4 }}
  {{- end }}
  template:
    metadata:
      labels:
{{ toYaml ($app.labels | default (dict "app" $app.name)) | nindent 8 }}
      {{- with $app.podAnnotations }}
      annotations:
{{ toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ $app.serviceAccountName | default ($g.sa) }}

      {{/* ---- imagePullSecrets: per-app > global > legacy key; normalize to [{name:..}] ---- */}}
      {{- $raw := or $app.imagePullSecrets $.Values.imagePullSecrets $.Values.image.pullSecrets }}
      {{- if $raw }}
      {{- $ips := list }}
      {{- if kindIs "string" $raw }}
        {{- $ips = append $ips (dict "name" $raw) }}
      {{- else }}
        {{- range $raw }}
          {{- if kindIs "string" . }}
            {{- $ips = append $ips (dict "name" .) }}
          {{- else }}
            {{- $ips = append $ips . }}
          {{- end }}
        {{- end }}
      {{- end }}
      imagePullSecrets:
{{ toYaml $ips | nindent 8 }}
      {{- end }}

      {{- with $app.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with $app.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with $app.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with $app.tolerations }}
      tolerations:
{{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with $app.podSecurityContext }}
      securityContext:
{{ toYaml . | nindent 8 }}
      {{- end }}

      {{- with $app.initContainers }}
      initContainers:
{{ toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: {{ $app.name }}
          image: "{{ required (printf "apps[%s].image is required" $app.name) $app.image }}"
          imagePullPolicy: {{ $app.imagePullPolicy | default "IfNotPresent" }}

          {{- with $app.command }}
          command:
{{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with $app.args }}
          args:
{{ toYaml . | nindent 12 }}
          {{- end }}

          {{- with $app.env }}
          env:
{{ toYaml . | nindent 12 }}
          {{- end }}

          {{- with $app.envFrom }}
          envFrom:
          {{- range . }}
            {{- if hasKey . "configMapRef" }}
              {{- $cm := get . "configMapRef" }}
            - configMapRef:
                {{- if kindIs "map" $cm }}
                {{- with (get $cm "name") }}
                  name: {{ . }}
                {{- else }}
                  {{ fail "envFrom.configMapRef.name is required" }}
                {{- end }}
                {{- with (get $cm "optional") }}
                  optional: {{ . }}
                {{- end }}
                {{- else if kindIs "string" $cm }}
                  name: {{ $cm }}
                {{- else }}
                  {{ fail "envFrom.configMapRef must be string or map{name,...}" }}
                {{- end }}
            {{- else if hasKey . "secretRef" }}
              {{- $sr := get . "secretRef" }}
            - secretRef:
                {{- if kindIs "map" $sr }}
                {{- with (get $sr "name") }}
                  name: {{ . }}
                {{- else }}
                  {{ fail "envFrom.secretRef.name is required" }}
                {{- end }}
                {{- with (get $sr "optional") }}
                  optional: {{ . }}
                {{- end }}
                {{- else if kindIs "string" $sr }}
                  name: {{ $sr }}
                {{- else }}
                  {{ fail "envFrom.secretRef must be string or map{name,...}" }}
                {{- end }}
            {{- else }}
            - {{ toYaml . | nindent 2 }}
            {{- end }}
          {{- end }}
          {{- end }}

          {{- with $app.ports }}
          ports:
          {{- range . }}
            - name: {{ .name | default (printf "%s-%d" $app.name .containerPort) }}
              containerPort: {{ .containerPort }}
              {{- with .protocol }}protocol: {{ . }}{{- end }}
          {{- end }}
          {{- end }}

          {{- with $app.resources }}
          resources:
{{ toYaml . | nindent 12 }}
          {{- end }}

          {{- with $app.volumeMounts }}
          volumeMounts:
          {{- range . }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              {{- with .subPath }}
              subPath: {{ . }}
              {{- end }}
              {{- with .readOnly }}
              readOnly: {{ . }}
              {{- end }}
          {{- end }}
          {{- end }}

          {{- $appReadiness := (or $app.readinessProbe (get $globalProbes "readiness")) -}}
          {{- if and $appReadiness ($appReadiness.enabled | default false) }}
          readinessProbe:
            {{- if $appReadiness.httpGet }}
            httpGet:
              path: {{ $appReadiness.httpGet.path | default "/healthz" }}
              port: {{ $appReadiness.httpGet.port | default "http" }}
            {{- end }}
            {{- if $appReadiness.tcpSocket }}
            tcpSocket:
              port: {{ $appReadiness.tcpSocket.port | default "http" }}
            {{- end }}
            {{- with $appReadiness.initialDelaySeconds }}
            initialDelaySeconds: {{ . }}
            {{- end }}
            {{- with $appReadiness.periodSeconds }}
            periodSeconds: {{ . }}
            {{- end }}
            {{- with $appReadiness.timeoutSeconds }}
            timeoutSeconds: {{ . }}
            {{- end }}
            {{- with $appReadiness.failureThreshold }}
            failureThreshold: {{ . }}
            {{- end }}
            {{- with $appReadiness.successThreshold }}
            successThreshold: {{ . }}
            {{- end }}
          {{- end }}

          {{- $appLiveness := (or $app.livenessProbe (get $globalProbes "liveness")) -}}
          {{- if and $appLiveness ($appLiveness.enabled | default false) }}
          livenessProbe:
            {{- if $appLiveness.httpGet }}
            httpGet:
              path: {{ $appLiveness.httpGet.path | default "/" }}
              port: {{ $appLiveness.httpGet.port | default "http" }}
            {{- end }}
            {{- if $appLiveness.tcpSocket }}
            tcpSocket:
              port: {{ $appLiveness.tcpSocket.port | default "http" }}
            {{- end }}
            {{- with $appLiveness.initialDelaySeconds }}
            initialDelaySeconds: {{ . }}
            {{- end }}
            {{- with $appLiveness.periodSeconds }}
            periodSeconds: {{ . }}
            {{- end }}
            {{- with $appLiveness.timeoutSeconds }}
            timeoutSeconds: {{ . }}
            {{- end }}
            {{- with $appLiveness.failureThreshold }}
            failureThreshold: {{ . }}
            {{- end }}
            {{- with $appLiveness.successThreshold }}
            successThreshold: {{ . }}
            {{- end }}
          {{- end }}

        {{- with $app.sidecars }}
        {{- range . }}
        - name: {{ .name }}
{{ toYaml . | nindent 10 }}
        {{- end }}
        {{- end }}

      {{- with $app.volumes }}
      volumes:
      {{- range . }}
        - name: {{ .name }}
          {{- if .pvc }}
          persistentVolumeClaim:
            claimName: {{ .pvc }}
          {{- else if .configMap }}
          configMap:
            {{- if kindIs "map" .configMap }}
{{ toYaml .configMap | nindent 12 }}
            {{- else }}
            name: {{ .configMap }}
            {{- end }}
          {{- else if .secret }}
          secret:
            {{- if kindIs "map" .secret }}
{{ toYaml .secret | nindent 12 }}
            {{- else }}
            secretName: {{ .secret }}
            {{- end }}
          {{- else if .hostPath }}
          hostPath:
            path: {{ .hostPath | quote }}
            {{- with .hostPathType }}
            type: {{ . }}
            {{- end }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- end }}
      {{- end }}

      {{- with $app.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
{{- end }}
{{- end }}
