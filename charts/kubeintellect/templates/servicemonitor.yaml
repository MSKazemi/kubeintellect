{{- if .Values.exporters.enabled }}
# ServiceMonitor for the KubeIntellect API.
# Tells Prometheus (kube-prometheus-stack) to scrape /metrics from the
# kubeintellect-core-service. Requires kube-prometheus-stack to be installed
# with serviceMonitorSelectorNilUsesHelmValues=false (see Makefile).
#
# Custom metrics exposed:
#   kubeintellect_agent_invocations_total{agent}
#   kubeintellect_tool_calls_total{tool, status}
#   kubeintellect_workflow_duration_seconds
#   kubeintellect_hitl_decisions_total{decision}
# Plus standard HTTP metrics from prometheus-fastapi-instrumentator.
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kubeintellect-api
  namespace: {{ .Values.namespace | default "kubeintellect" }}
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: kubeintellect-core
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
{{- end }}
