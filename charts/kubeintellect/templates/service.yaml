{{- /*
Generic multi-service template:
- If services[].selector is provided, render it as-is (explicit).
- Else if services[].selectorAppSuffix is provided, render selector.app: "<fullname>-<suffix>" (explicit in output).
- Else fallback to selector.app: "<fullname>-core".
*/ -}}
{{- $full := include "kubeintellect.fullname" . -}}
{{- $name := include "kubeintellect.name" . -}}
{{- $ns := .Values.namespace | default .Release.Namespace -}}

{{- range $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s" $svc.name }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/component: {{ $svc.name }}
  {{- with $svc.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ $svc.type | default "ClusterIP" }}
  {{- if hasKey $svc "clusterIP" }}
  clusterIP: {{ $svc.clusterIP }}
  {{- end }}
  selector:
    {{- if $svc.selector }}
{{ toYaml $svc.selector | nindent 4 }}
    {{- else if $svc.selectorAppSuffix }}
    app: {{ printf "%s-%s" $full $svc.selectorAppSuffix }}
    {{- else }}
    app: {{ printf "%s-core" $full }}
    {{- end }}
  ports:
  {{- range $p := $svc.ports }}
    - name: {{ $p.name | default (printf "%s-%d" $svc.name $p.port) }}
      port: {{ $p.port }}
      targetPort: {{ $p.targetPort | default $p.port }}
      protocol: {{ $p.protocol | default "TCP" }}
      {{- if $p.nodePort }}
      nodePort: {{ $p.nodePort }}
      {{- end }}
  {{- end }}
{{- end }}
{{- end }}
