{{- /*
HorizontalPodAutoscaler for kubeintellect-core.
Enabled only when hpa.enabled is true in values.
Prerequisite: AsyncPostgresSaver (shared Postgres state) and
              ReadWriteMany runtime-tools PVC (shared tool storage).
*/ -}}
{{- $ns := .Values.namespace | default .Release.Namespace }}
{{- if .Values.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kubeintellect-core-hpa
  namespace: {{ $ns }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kubeintellect-core
  minReplicas: {{ .Values.hpa.minReplicas | default 2 }}
  maxReplicas: {{ .Values.hpa.maxReplicas | default 8 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.cpuTargetPercent | default 70 }}
{{- end }}
