{{- /*
Generic PersistentVolume template.
- Loops through .Values.persistentVolumes
- Each entry can specify name, capacity, accessModes, reclaimPolicy, storageClass, and hostPath
*/ -}}
{{- $ns := .Values.namespace | default .Release.Namespace -}}
{{- range $pv := .Values.persistentVolumes }}
{{- if $pv.enabled }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ $pv.name }}
  namespace: {{ $pv.namespace | default $ns }}
  labels:
    app.kubernetes.io/name: {{ include "kubeintellect.name" $ }}
    app.kubernetes.io/component: {{ $pv.component | default $pv.name }}
{{- if $pv.labels }}
{{- range $key, $value := $pv.labels }}
    {{ $key }}: {{ $value }}
{{- end }}
{{- end }}
spec:
  capacity:
    storage: {{ $pv.storage | default "5Gi" }}
  accessModes:
  {{- range $pv.accessModes }}
    - {{ . }}
  {{- end }}
  persistentVolumeReclaimPolicy: {{ $pv.reclaimPolicy | default "Retain" }}
  storageClassName: {{ $pv.storageClassName | default "default" }}
  {{- if $pv.nfs }}
  nfs:
    server: {{ $pv.nfs.server }}
    path: {{ $pv.nfs.path }}
  {{- else if $pv.hostPath }}
  hostPath:
    path: {{ $pv.hostPath | quote }}
    {{- if $pv.hostPathType }}
    type: {{ $pv.hostPathType }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
