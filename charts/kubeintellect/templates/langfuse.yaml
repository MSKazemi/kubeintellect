{{/*
  templates/langfuse.yaml

  Self-hosted Langfuse LLM observability stack.
  All resources are only created when .Values.langfuse.enabled is true.

  Services deployed:
    langfuse-postgres   — project metadata, users, API keys
    langfuse-clickhouse — traces, observations, evaluations (analytics store)
    langfuse-redis      — task queue between web and worker
    langfuse-minio      — blob storage for traces (S3-compatible)
    langfuse-web        — Next.js UI + REST API (port 3000)
    langfuse-worker     — background job processor

  Access:
    kubectl -n kubeintellect port-forward svc/langfuse-web 3000:3000
    OR via Ingress at http://langfuse.local (add to /etc/hosts)

  After first startup (~2 min), open http://localhost:3000 and register.
  The first user to register becomes admin.
*/}}

{{- if .Values.langfuse.enabled }}
{{- $ns := .Values.langfuse.namespace | default .Values.namespace | default .Release.Namespace }}
{{- $pgPass    := .Values.langfuse.postgres.password   | default "langfuse" }}
{{- $chPass    := .Values.langfuse.clickhouse.password | default "langfuse" }}
{{- $minioUser := .Values.langfuse.minio.rootUser      | default "langfuse" }}
{{- $minioPwd  := .Values.langfuse.minio.rootPassword  | default "langfuse123" }}

# ─────────────────────────────────────────────────────────────────────────────
# PersistentVolumeClaims
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-postgres-pvc
  namespace: {{ $ns | quote }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.langfuse.postgres.storage | default "10Gi" }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-clickhouse-pvc
  namespace: {{ $ns | quote }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.langfuse.clickhouse.storage | default "30Gi" }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-redis-pvc
  namespace: {{ $ns | quote }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.langfuse.redis.storage | default "2Gi" }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-minio-pvc
  namespace: {{ $ns | quote }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.langfuse.minio.storage | default "50Gi" }}

# ─────────────────────────────────────────────────────────────────────────────
# ClickHouse ConfigMap
# Enables ClickHouse Keeper (built-in ZooKeeper replacement) required for
# Langfuse v3 migrations that use ReplicatedMergeTree ON CLUSTER.
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: langfuse-clickhouse-config
  namespace: {{ $ns | quote }}
data:
  langfuse.xml: |
    <clickhouse>
      <!-- ClickHouse Keeper: built-in ZooKeeper replacement -->
      <keeper_server>
        <tcp_port>9181</tcp_port>
        <server_id>1</server_id>
        <log_storage_path>/var/lib/clickhouse/coordination/log</log_storage_path>
        <snapshot_storage_path>/var/lib/clickhouse/coordination/snapshots</snapshot_storage_path>
        <coordination_settings>
          <operation_timeout_ms>10000</operation_timeout_ms>
          <session_timeout_ms>30000</session_timeout_ms>
          <raft_logs_level>warning</raft_logs_level>
        </coordination_settings>
        <raft_configuration>
          <server>
            <id>1</id>
            <hostname>localhost</hostname>
            <port>9444</port>
          </server>
        </raft_configuration>
      </keeper_server>

      <!-- Tell ClickHouse to use the built-in Keeper -->
      <zookeeper>
        <node>
          <host>localhost</host>
          <port>9181</port>
        </node>
      </zookeeper>

      <!-- Single-node cluster: required for ON CLUSTER migrations -->
      <remote_servers>
        <default>
          <shard>
            <replica>
              <host>localhost</host>
              <port>9000</port>
            </replica>
          </shard>
        </default>
      </remote_servers>

      <!-- Macros for ReplicatedMergeTree table paths -->
      <macros>
        <shard>01</shard>
        <replica>01</replica>
        <cluster>default</cluster>
      </macros>
    </clickhouse>

# ─────────────────────────────────────────────────────────────────────────────
# Secret — Langfuse credentials
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secret
  namespace: {{ $ns | quote }}
type: Opaque
stringData:
  DATABASE_URL: {{ printf "postgresql://langfuse:%s@langfuse-postgres:5432/langfuse" $pgPass | quote }}
  NEXTAUTH_URL: {{ .Values.langfuse.nextauthUrl | default "http://localhost:3000" | quote }}
  NEXTAUTH_SECRET: {{ .Values.langfuse.nextauthSecret | default "changeme-nextauth-secret-min-32-chars-long" | quote }}
  SALT: {{ .Values.langfuse.salt | default "changeme-salt-value" | quote }}
  # ENCRYPTION_KEY must be a real 64-character hex string (32 bytes).
  # Generate with: openssl rand -hex 32
  ENCRYPTION_KEY: {{ .Values.langfuse.encryptionKey | default "" | quote }}
  CLICKHOUSE_USER: "default"
  CLICKHOUSE_PASSWORD: {{ $chPass | quote }}
  REDIS_HOST: "langfuse-redis"
  REDIS_PORT: "6379"
  LANGFUSE_S3_EVENT_UPLOAD_BUCKET: "langfuse"
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: {{ $minioUser | quote }}
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: {{ $minioPwd | quote }}
  LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: "http://langfuse-minio:9000"
  LANGFUSE_S3_EVENT_UPLOAD_REGION: "us-east-1"
  LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: "langfuse"
  LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: {{ $minioUser | quote }}
  LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: {{ $minioPwd | quote }}
  LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: "http://langfuse-minio:9000"
  LANGFUSE_S3_MEDIA_UPLOAD_REGION: "us-east-1"
  LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
  # Seed: auto-create org / project / API keys / admin user on first startup.
  # Idempotent — safe to re-deploy; existing records are left unchanged.
  LANGFUSE_INIT_ORG_ID: {{ .Values.langfuse.initOrg.id | default "kubeintellect-org" | quote }}
  LANGFUSE_INIT_ORG_NAME: {{ .Values.langfuse.initOrg.name | default "KubeIntellect" | quote }}
  LANGFUSE_INIT_PROJECT_ID: {{ .Values.langfuse.initProject.id | default "kubeintellect-project" | quote }}
  LANGFUSE_INIT_PROJECT_NAME: {{ .Values.langfuse.initProject.name | default "KubeIntellect" | quote }}
  LANGFUSE_INIT_PROJECT_PUBLIC_KEY: {{ .Values.langfuse.initProject.publicKey | default "" | quote }}
  LANGFUSE_INIT_PROJECT_SECRET_KEY: {{ .Values.langfuse.initProject.secretKey | default "" | quote }}
  LANGFUSE_INIT_USER_EMAIL: {{ .Values.langfuse.initUser.email | default "" | quote }}
  LANGFUSE_INIT_USER_NAME: {{ .Values.langfuse.initUser.name | default "Admin" | quote }}
  LANGFUSE_INIT_USER_PASSWORD: {{ .Values.langfuse.initUser.password | default "" | quote }}

# ─────────────────────────────────────────────────────────────────────────────
# Deployments
# ─────────────────────────────────────────────────────────────────────────────

# --- PostgreSQL (Langfuse metadata) ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-postgres
  namespace: {{ $ns | quote }}
  labels:
    app: langfuse-postgres
    component: langfuse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-postgres
  template:
    metadata:
      labels:
        app: langfuse-postgres
        component: langfuse
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: langfuse
            - name: POSTGRES_PASSWORD
              value: {{ $pgPass | quote }}
            - name: POSTGRES_DB
              value: langfuse
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "langfuse", "-d", "langfuse"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: langfuse-postgres-pvc

# --- ClickHouse (trace/observation store) ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-clickhouse
  namespace: {{ $ns | quote }}
  labels:
    app: langfuse-clickhouse
    component: langfuse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-clickhouse
  template:
    metadata:
      labels:
        app: langfuse-clickhouse
        component: langfuse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.12
          env:
            - name: CLICKHOUSE_DB
              value: langfuse
            - name: CLICKHOUSE_USER
              value: default
            - name: CLICKHOUSE_PASSWORD
              value: {{ $chPass | quote }}
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: config
              mountPath: /etc/clickhouse-server/config.d/langfuse.xml
              subPath: langfuse.xml
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: langfuse-clickhouse-pvc
        - name: config
          configMap:
            name: langfuse-clickhouse-config

# --- Redis (task queue) ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-redis
  namespace: {{ $ns | quote }}
  labels:
    app: langfuse-redis
    component: langfuse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-redis
  template:
    metadata:
      labels:
        app: langfuse-redis
        component: langfuse
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: langfuse-redis-pvc

# --- MinIO (S3-compatible blob store) ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-minio
  namespace: {{ $ns | quote }}
  labels:
    app: langfuse-minio
    component: langfuse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-minio
  template:
    metadata:
      labels:
        app: langfuse-minio
        component: langfuse
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: {{ $minioUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ $minioPwd | quote }}
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: langfuse-minio-pvc

# --- Langfuse Web (UI + API) ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-web
  namespace: {{ $ns | quote }}
  labels:
    app: langfuse-web
    component: langfuse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-web
  template:
    metadata:
      labels:
        app: langfuse-web
        component: langfuse
    spec:
      initContainers:
        # Wait for all dependencies before starting
        - name: wait-for-postgres
          image: busybox:latest
          command: ["sh", "-c", "until nc -z langfuse-postgres 5432; do echo waiting for postgres; sleep 2; done"]
        - name: wait-for-clickhouse
          image: busybox:latest
          command: ["sh", "-c", "until nc -z langfuse-clickhouse 8123; do echo waiting for clickhouse; sleep 2; done"]
        - name: wait-for-redis
          image: busybox:latest
          command: ["sh", "-c", "until nc -z langfuse-redis 6379; do echo waiting for redis; sleep 2; done"]
        - name: wait-for-minio
          image: busybox:latest
          command: ["sh", "-c", "until nc -z langfuse-minio 9000; do echo waiting for minio; sleep 2; done"]
      containers:
        - name: langfuse-web
          image: langfuse/langfuse:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: langfuse-secret
          env:
            - name: CLICKHOUSE_URL
              value: "http://langfuse-clickhouse:8123"
            - name: CLICKHOUSE_MIGRATION_URL
              value: "clickhouse://langfuse-clickhouse:9000"
            - name: TELEMETRY_ENABLED
              value: "false"
            - name: LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES
              value: "false"
            - name: LANGFUSE_RETENTION_DAYS
              value: "365"
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 3

# --- Langfuse Worker (background jobs) ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-worker
  namespace: {{ $ns | quote }}
  labels:
    app: langfuse-worker
    component: langfuse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-worker
  template:
    metadata:
      labels:
        app: langfuse-worker
        component: langfuse
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:latest
          command: ["sh", "-c", "until nc -z langfuse-postgres 5432; do echo waiting for postgres; sleep 2; done"]
        - name: wait-for-clickhouse
          image: busybox:latest
          command: ["sh", "-c", "until nc -z langfuse-clickhouse 8123; do echo waiting for clickhouse; sleep 2; done"]
        - name: wait-for-redis
          image: busybox:latest
          command: ["sh", "-c", "until nc -z langfuse-redis 6379; do echo waiting for redis; sleep 2; done"]
        - name: wait-for-minio
          image: busybox:latest
          command: ["sh", "-c", "until nc -z langfuse-minio 9000; do echo waiting for minio; sleep 2; done"]
      containers:
        - name: langfuse-worker
          image: langfuse/langfuse-worker:latest
          envFrom:
            - secretRef:
                name: langfuse-secret
          env:
            - name: CLICKHOUSE_URL
              value: "http://langfuse-clickhouse:8123"
            - name: CLICKHOUSE_MIGRATION_URL
              value: "clickhouse://langfuse-clickhouse:9000"
            - name: LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES
              value: "false"
            - name: LANGFUSE_RETENTION_DAYS
              value: "365"

# ─────────────────────────────────────────────────────────────────────────────
# MinIO bucket init Job
# Creates the 'langfuse' bucket. Retries until MinIO is ready, then exits.
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: batch/v1
kind: Job
metadata:
  name: langfuse-minio-init
  namespace: {{ $ns | quote }}
  labels:
    component: langfuse
  annotations:
    # Helm will re-run this job on every upgrade — use helm.sh/hook for one-shot if preferred
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        component: langfuse
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-init
          image: minio/minio:latest
          command:
            - /bin/sh
            - -c
            - |
              mc alias set local http://langfuse-minio:9000 {{ $minioUser }} {{ $minioPwd }} &&
              mc mb --ignore-existing local/langfuse &&
              echo "MinIO bucket 'langfuse' ready."

# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-postgres
  namespace: {{ $ns | quote }}
  labels:
    component: langfuse
spec:
  selector:
    app: langfuse-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-clickhouse
  namespace: {{ $ns | quote }}
  labels:
    component: langfuse
spec:
  selector:
    app: langfuse-clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-redis
  namespace: {{ $ns | quote }}
  labels:
    component: langfuse
spec:
  selector:
    app: langfuse-redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-minio
  namespace: {{ $ns | quote }}
  labels:
    component: langfuse
spec:
  selector:
    app: langfuse-minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-web
  namespace: {{ $ns | quote }}
  labels:
    component: langfuse
spec:
  selector:
    app: langfuse-web
  ports:
    - port: 3000
      targetPort: 3000

# ─────────────────────────────────────────────────────────────────────────────
# Ingress (optional)
# ─────────────────────────────────────────────────────────────────────────────
{{- if .Values.langfuse.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: langfuse
  namespace: {{ $ns | quote }}
  labels:
    component: langfuse
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: {{ .Values.langfuse.ingress.className | default "nginx" }}
  rules:
    - host: {{ .Values.langfuse.ingress.host | default "langfuse.local" | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langfuse-web
                port:
                  number: 3000
  tls: []
{{- end }}

{{- end }}{{/* langfuse.enabled */}}
