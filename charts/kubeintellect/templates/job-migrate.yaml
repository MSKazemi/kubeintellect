apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kubeintellect.fullname" . }}-migrate
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "50"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-timeout": "600"
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: migrate
        image: postgres:{{ .Values.postgres.imageTag | default "15" }}
        env:
        - name: PGHOST
          value: {{ .Values.postgres.host | default "postgres" | quote }}
        - name: PGPORT
          value: {{ .Values.postgres.port | default "5432" | quote }}
        - name: PGDATABASE
          value: {{ .Values.postgres.db | default "kubeintellectdb" | quote }}
        - name: PGUSER
          value: {{ .Values.postgres.user | default "kubeuser" | quote }}
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgres.secretName | default "postgres-secret" | quote }}
              key: {{ .Values.postgres.secretKey | default "password" | quote }}
        command: ["/bin/sh","-lc"]
        args:
          - |
            set -e
            echo "Waiting for Postgres at ${PGHOST}:${PGPORT}..."
            MAX_WAIT=300
            ELAPSED=0
            while [ $ELAPSED -lt $MAX_WAIT ]; do
              if pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE" -t 2 >/dev/null 2>&1; then
                echo "Postgres is ready!"
                break
              fi
              echo "Postgres not ready yet, retrying... (${ELAPSED}s/${MAX_WAIT}s)"
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done
            if [ $ELAPSED -ge $MAX_WAIT ]; then
              echo "ERROR: Postgres did not become ready within ${MAX_WAIT} seconds"
              exit 1
            fi
            echo "Running migration..."
            psql -v ON_ERROR_STOP=1 <<'SQL'
            CREATE TABLE IF NOT EXISTS workflow_checkpoints (
              user_id   TEXT NOT NULL,
              thread_id TEXT NOT NULL,
              config    JSONB,
              state     BYTEA,
              updated_at TIMESTAMP DEFAULT now(),
              PRIMARY KEY (user_id, thread_id)
            );
            CREATE INDEX IF NOT EXISTS idx_workflow_checkpoints_updated_at
              ON workflow_checkpoints (updated_at DESC);
            SQL
            echo "Migration completed successfully!"
