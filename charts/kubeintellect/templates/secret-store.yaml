{{- if .Values.externalSecrets.enabled }}
---
# ESO ServiceAccount — federated to Azure Managed Identity via Workload Identity
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeintellect-eso-sa
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  annotations:
    azure.workload.identity/client-id: {{ required "azureKeyVault.clientId is required" .Values.azureKeyVault.clientId | quote }}
  labels:
    azure.workload.identity/use: "true"
    {{- include "kubeintellect.labels" . | nindent 4 }}
---
# SecretStore — points ESO at Azure Key Vault using Workload Identity
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: azure-kv-store
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "kubeintellect.labels" . | nindent 4 }}
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: {{ required "azureKeyVault.url is required" .Values.azureKeyVault.url | quote }}
      tenantId: {{ required "azureKeyVault.tenantId is required" .Values.azureKeyVault.tenantId | quote }}
      serviceAccountRef:
        name: kubeintellect-eso-sa
{{- end }}
