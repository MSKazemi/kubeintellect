{{- $ns := (.Values.namespace | default .Release.Namespace) -}}
{{- $sa := .Values.serviceAccount.name -}}

{{/* 1) Namespaced read-only Role + Binding (only namespaced resources) */}}
{{- if .Values.rbac.createNamespaced }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kubeintellect.fullname" . }}-role
  namespace: {{ $ns }}
rules:
- apiGroups: [""]
  resources:
    - pods
    - services
    - configmaps
    - secrets
    - endpoints
    - events
    - persistentvolumeclaims
    - serviceaccounts
    - namespaces          # read-only within the namespace’s own object is allowed
  verbs: ["get","list","watch"]
- apiGroups: ["apps"]
  resources:
    - deployments
    - daemonsets
    - statefulsets
    - replicasets
  verbs: ["get","list","watch"]
- apiGroups: ["networking.k8s.io"]
  resources:
    - ingresses
    - networkpolicies
  verbs: ["get","list","watch"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources:
    - roles
    - rolebindings
  verbs: ["get","list","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubeintellect.fullname" . }}-rolebinding
  namespace: {{ $ns }}
subjects:
- kind: ServiceAccount
  name: {{ $sa }}
  namespace: {{ $ns }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kubeintellect.fullname" . }}-role
{{- end }}

{{/* 2) Optional cluster-scope read-only ClusterRole + Binding (for nodes, PVs, all namespaces) */}}
{{- if .Values.rbac.createClusterReadOnly }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubeintellect.fullname" . }}-cluster-ro
rules:
- apiGroups: [""]
  resources:
    - nodes                 # cluster-scoped
    - persistentvolumes     # cluster-scoped
    - namespaces            # cluster-scoped
    - pods
    - services
    - configmaps
    - secrets
    - endpoints
    - events
    - persistentvolumeclaims
    - serviceaccounts
  verbs: ["get","list","watch"]
- apiGroups: ["apps"]
  resources: ["deployments","daemonsets","statefulsets","replicasets"]
  verbs: ["get","list","watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses","networkpolicies"]
  verbs: ["get","list","watch"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles","rolebindings","clusterroles","clusterrolebindings"]
  verbs: ["get","list","watch"]
# Required for rbac_check tool: SubjectAccessReview lets KubeIntellect check whether
# an arbitrary subject (User/ServiceAccount/Group) is allowed to perform a verb on a
# resource — not just KubeIntellect's own SA. Scoped to this single resource only;
# no wildcards. See app/agents/tools/tools_lib/rbac_tools.py: rbac_check().
- apiGroups: ["authorization.k8s.io"]
  resources: ["subjectaccessreviews"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubeintellect.fullname" . }}-cluster-ro-binding
subjects:
- kind: ServiceAccount
  name: {{ $sa }}
  namespace: {{ $ns }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubeintellect.fullname" . }}-cluster-ro
{{- end }}

{{/* 2b) Optional: minimal namespace/pod management for kubeintellect-sa (feature-flagged) */}}
{{- if .Values.rbac.enableNamespaceManagement }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubeintellect.fullname" . }}-namespace-manager
rules:
- apiGroups: [""]
  resources:
    - namespaces
  verbs: ["get","list","watch","create","patch","update","delete"]
- apiGroups: [""]
  resources:
    - pods
  verbs: ["create","get","list","watch","delete","patch","update"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources:
    - roles
    - rolebindings
  verbs: ["create","get","list","watch","patch","update","delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubeintellect.fullname" . }}-namespace-manager-binding
subjects:
- kind: ServiceAccount
  name: {{ $sa }}
  namespace: {{ $ns }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubeintellect.fullname" . }}-namespace-manager
{{- end }}

{{/* 3) Dangerous: optional cluster-admin (break-glass) */}}
{{- if .Values.rbac.createClusterAdmin }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubeintellect.fullname" . }}-cluster-admin
subjects:
- kind: ServiceAccount
  name: {{ $sa }}
  namespace: {{ $ns }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
{{- end }}
