{{- /*
Generic multi-secret template.
- Loops through .Values.secrets
- Supports .data (already base64) and .stringData (plain)
- Supports different namespaces and secret types
*/ -}}
{{- $defaultNs := .Values.namespace | default .Release.Namespace -}}
{{- range $secret := .Values.secrets }}
{{- if $secret.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secret.name }}
  namespace: {{ $secret.namespace | default $defaultNs }}
  {{- with $secret.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
type: {{ $secret.type | default "Opaque" }}
{{- if $secret.data }}
data:
{{- range $k, $v := $secret.data }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
{{- if $secret.stringData }}
stringData:
{{- range $k, $v := $secret.stringData }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
