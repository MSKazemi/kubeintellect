{{- if .Values.exporters.enabled }}
# DB exporters: MongoDB and PostgreSQL metrics for Prometheus.
# These are scraped automatically when kube-prometheus-stack is installed with
# serviceMonitorSelectorNilUsesHelmValues=false (see Makefile install-prometheus-kind).
#
# Grafana community dashboards to import:
#   MongoDB:    https://grafana.com/grafana/dashboards/7353
#   PostgreSQL: https://grafana.com/grafana/dashboards/9628

# ─── MongoDB Exporter ─────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-exporter
  namespace: {{ .Values.namespace | default "kubeintellect" }}
  labels:
    app: mongodb-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-exporter
  template:
    metadata:
      labels:
        app: mongodb-exporter
    spec:
      containers:
        - name: mongodb-exporter
          image: {{ .Values.exporters.mongodb.image }}
          args:
            - --mongodb.uri=mongodb://mongodb.{{ .Values.namespace | default "kubeintellect" }}.svc.cluster.local:27017
            - --collect-all
          ports:
            - name: metrics
              containerPort: 9216
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-exporter
  namespace: {{ .Values.namespace | default "kubeintellect" }}
  labels:
    app: mongodb-exporter
spec:
  selector:
    app: mongodb-exporter
  ports:
    - name: metrics
      port: 9216
      targetPort: 9216
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mongodb-exporter
  namespace: {{ .Values.namespace | default "kubeintellect" }}
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: mongodb-exporter
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics

# ─── PostgreSQL Exporter ──────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: {{ .Values.namespace | default "kubeintellect" }}
  labels:
    app: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: {{ .Values.exporters.postgres.image }}
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: DATA_SOURCE_NAME
              value: "postgresql://kubeuser:$(PGPASSWORD)@postgres.{{ .Values.namespace | default "kubeintellect" }}.svc.cluster.local:5432/kubeintellectdb?sslmode=disable"
          ports:
            - name: metrics
              containerPort: 9187
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: {{ .Values.namespace | default "kubeintellect" }}
  labels:
    app: postgres-exporter
spec:
  selector:
    app: postgres-exporter
  ports:
    - name: metrics
      port: 9187
      targetPort: 9187
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-exporter
  namespace: {{ .Values.namespace | default "kubeintellect" }}
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: postgres-exporter
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
{{- end }}
