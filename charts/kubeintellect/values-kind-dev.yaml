# values-kind-dev.yaml — Dev overlay for local Kind cluster
#
# Usage (always layer on top of values-kind.yaml):
#   helm upgrade --install kubeintellect charts/kubeintellect \
#     -n kubeintellect --create-namespace \
#     -f charts/kubeintellect/values-kind.yaml \
#     -f charts/kubeintellect/values-kind-dev.yaml \
#     --wait --timeout 5m
#
# What this changes vs values-kind.yaml:
#   • kubeintellect-core: uses kubeintellect:dev (locally built, never pulled from registry)
#   • kubeintellect-core: removes ghcr-creds imagePullSecret (not needed for local image)
#   • kubeintellect-core: mounts host app/ package at /app/app via hostPath
#     → uvicorn --reload picks up Python file changes instantly — no image rebuild needed
#     → mounts only /app/app so that /app/.venv from the image is preserved
#
# Prerequisites:
#   1. `mkdir -p .local-data/postgres` in project root (hostPath for postgres PV)
#   2. `make kind-build` to build and load kubeintellect:dev into the Kind cluster
#
# NOTE: Helm replaces arrays entirely when merging values files.
# All apps must be listed here; only kubeintellect-core is modified from values-kind.yaml.

apps:
  - name: kubeintellect-core
    enabled: true
    replicas: 1
    labels: { app: kubeintellect-core }
    image: kubeintellect:dev
    imagePullSecrets: []
    imagePullPolicy: Never
    ports:
      - name: http
        containerPort: 8000
    initContainers:
      - name: fix-runtime-tools-perms
        image: busybox:1.36
        securityContext:
          runAsUser: 0
          runAsGroup: 0
        command: ["sh", "-c"]
        args:
          - |
            set -eux
            mkdir -p /mnt/runtime-tools/tools
            chown 1001:1001 /mnt/runtime-tools/tools
            chmod 755 /mnt/runtime-tools/tools
        volumeMounts:
          - name: runtime-tools-storage
            mountPath: /mnt/runtime-tools
    envFrom:
      - configMapRef:
          name: kubeintellect-core-config
      - secretRef:
          name: kubeintellect-core-secret
    volumeMounts:
      - name: runtime-tools-storage
        mountPath: /mnt/runtime-tools
      - name: app-code
        mountPath: /app/app
    volumes:
      - name: runtime-tools-storage
        pvc: kubeintellect-runtime-tools-pvc
      - name: app-code
        hostPath: /mnt/code/KubeIntellect/app

  - name: mongodb
    enabled: true
    replicas: 1
    labels: { app: mongodb }
    image: mongo:6
    command: ["mongod", "--noauth", "--bind_ip_all"]
    ports:
      - name: mongo
        containerPort: 27017
    volumeMounts:
      - name: mongo-data
        mountPath: /data/db
    volumes:
      - name: mongo-data
        pvc: mongo-data-pvc

  - name: meilisearch
    enabled: true
    replicas: 1
    labels: { app: meilisearch }
    image: getmeili/meilisearch:v1.12.3
    envFrom:
      - configMapRef:
          name: librechat-env
    ports:
      - name: http
        containerPort: 7700
    volumeMounts:
      - name: meili-data
        mountPath: /meili_data
    volumes:
      - name: meili-data
        pvc: meili-data-pvc

  - name: librechat
    enabled: true
    replicas: 1
    labels: { app: librechat }
    image: ghcr.io/mskazemi/kubeintellect-frontend:latest
    imagePullSecrets: []  # GHCR images are public
    imagePullPolicy: Always
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      capabilities: { drop: ["ALL"] }
    envFrom:
      - configMapRef:
          name: librechat-env
      - configMapRef:
          name: librechat-config
      - secretRef:
          name: librechat-secret
    env:
      - name: PASS_CONVERSATION_ID
        value: "true"
      - name: DEBUG_CUSTOM_ENDPOINTS
        value: "true"
    ports:
      - name: http
        containerPort: 3080
    volumeMounts:
      - name: chat-volume
        mountPath: /app/client/public/images
      - name: librechat-config
        mountPath: /app/config/config.yaml
        subPath: config.yaml
      - name: librechat-config
        mountPath: /app/librechat.yaml
        subPath: librechat.yaml
    volumes:
      - name: chat-volume
        pvc: librechat-pvc
      - name: librechat-config
        configMap:
          name: librechat-config

  - name: postgres
    enabled: true
    replicas: 1
    labels: { app: postgres }
    image: postgres:15
    ports:
      - name: postgres
        containerPort: 5432
    env:
      - name: POSTGRES_DB
        value: kubeintellectdb
      - name: POSTGRES_USER
        value: kubeuser
      - name: POSTGRES_PASSWORD
        valueFrom:
          secretKeyRef:
            name: postgres-secret
            key: password
    volumeMounts:
      - name: postgres-storage
        mountPath: /var/lib/postgresql/data
    volumes:
      - name: postgres-storage
        pvc: postgres-pvc
