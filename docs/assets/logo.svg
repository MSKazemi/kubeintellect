<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#326CE5"/>
      <stop offset="100%" style="stop-color:#1A56C4"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2.5"/>
  <!-- 7 spokes (Kubernetes-style wheel) -->
  <!-- Spoke 1: top (0°) -->
  <line x1="32.0" y1="22.0" x2="32.0" y2="4.0" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Spoke 2: ~51.4° -->
  <line x1="39.8" y1="25.8" x2="53.9" y2="14.5" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Spoke 3: ~102.9° -->
  <line x1="41.7" y1="34.2" x2="59.3" y2="38.2" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Spoke 4: ~154.3° -->
  <line x1="36.3" y1="41.0" x2="44.2" y2="57.2" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Spoke 5: ~205.7° -->
  <line x1="27.7" y1="41.0" x2="19.9" y2="57.2" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Spoke 6: ~257.1° -->
  <line x1="22.3" y1="34.2" x2="4.7" y2="38.2" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Spoke 7: ~308.6° -->
  <line x1="24.2" y1="25.8" x2="10.1" y2="14.5" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Center hub -->
  <circle cx="32" cy="32" r="9" fill="white"/>
  <!-- Hub accent dot -->
  <circle cx="32" cy="32" r="3.5" fill="#326CE5"/>
</svg>
