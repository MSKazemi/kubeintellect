<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="KubeIntellect app icon">
  <title>KubeIntellect</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <radialGradient id="hg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e676" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#00e676" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#00e676" stop-opacity=".06"/>
      <stop offset="100%" stop-color="#00e676" stop-opacity="0"/>
    </radialGradient>
    <filter id="gl" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hgl" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <!-- Subtle radial glow on bg -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg2)"/>
  <!-- Border -->
  <rect x="2" y="2" width="1020" height="1020" rx="219" fill="none" stroke="#1e2d1e" stroke-width="2.5"/>

  <!-- Mark centered at (512, 490), scaled from 200-unit viewBox: scale factor = 4.2 -->
  <!-- All mark coordinates × 4.2, then translated to center at (512,490) -->
  <!-- center in mark = (100,100) → offset = (512-100×4.2, 490-100×4.2) = (512-420, 490-420) = (92, 70) -->
  <g transform="translate(92,70) scale(4.2)">

    <!-- Outer ring -->
    <circle cx="100" cy="100" r="94" fill="none" stroke="url(#g)" stroke-width="9" filter="url(#gl)"/>

    <!-- 7 spokes -->
    <g stroke="url(#g)" stroke-width="9" stroke-linecap="round" filter="url(#gl)">
      <line x1="100"   y1="66"    x2="100"   y2="16"/>
      <line x1="126.6" y1="78.8"  x2="165.7" y2="47.7"/>
      <line x1="133.1" y1="107.6" x2="181.9" y2="118.7"/>
      <line x1="114.8" y1="130.6" x2="136.4" y2="175.7"/>
      <line x1="85.2"  y1="130.6" x2="63.6"  y2="175.7"/>
      <line x1="66.9"  y1="107.6" x2="18.1"  y2="118.7"/>
      <line x1="73.4"  y1="78.8"  x2="34.3"  y2="47.7"/>
    </g>

    <!-- Hub -->
    <circle cx="100" cy="100" r="30" fill="#0a0a0a" stroke="url(#g)" stroke-width="9" filter="url(#gl)"/>
    <circle cx="100" cy="100" r="22" fill="url(#hg)"/>

    <!-- Neural net -->
    <g stroke="#00e676" stroke-width="1.8" opacity=".75">
      <line x1="100"   y1="100"   x2="100"   y2="87"/>
      <line x1="100"   y1="100"   x2="111.3" y2="106.5"/>
      <line x1="100"   y1="100"   x2="88.7"  y2="106.5"/>
      <line x1="100"   y1="87"    x2="111.3" y2="106.5"/>
      <line x1="111.3" y1="106.5" x2="88.7"  y2="106.5"/>
      <line x1="88.7"  y1="106.5" x2="100"   y2="87"/>
    </g>
    <g fill="#00e676">
      <circle cx="100"   cy="87"    r="3.5"/>
      <circle cx="111.3" cy="106.5" r="3.5"/>
      <circle cx="88.7"  cy="106.5" r="3.5"/>
    </g>
    <circle cx="100" cy="100" r="5.5" fill="#00d4ff" filter="url(#hgl)"/>
    <circle cx="100" cy="100" r="3"   fill="#ffffff"/>
  </g>

  <!-- KUBE wordmark -->
  <text
    x="512" y="870"
    text-anchor="middle"
    font-family="'Inter', 'Geist Sans', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="148"
    letter-spacing="24"
    fill="#f1f5f9"
  >KUBE</text>

  <!-- INTELLECT sub-label -->
  <text
    x="512" y="946"
    text-anchor="middle"
    font-family="'Inter', 'Geist Sans', 'Helvetica Neue', Arial, sans-serif"
    font-weight="300"
    font-size="60"
    letter-spacing="22"
    fill="#00e676"
    opacity=".9"
  >INTELLECT</text>
</svg>
