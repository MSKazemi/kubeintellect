site_name: KubeIntellect
site_description: AI-powered Kubernetes management — chat with your cluster in plain English
site_url: https://mskasemi.github.io/kubeintellect/
site_author: Mohsen Seyedkazemi Ardebili
repo_name: MSKazemi/kubeintellect
repo_url: https://github.com/MSKazemi/kubeintellect
edit_uri: edit/main/docs/
copyright: >
  Copyright &copy; 2024–2025 Mohsen Seyedkazemi Ardebili &mdash;
  <a href="#__consent">Change cookie settings</a>

# ─── Theme ────────────────────────────────────────────────────────────────────
theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg

  font:
    text: Inter
    code: JetBrains Mono

  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    # Navigation
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress

    # Search
    - search.highlight
    - search.suggest
    - search.share

    # Content
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips

    # ToC
    - toc.follow

    # Announce
    - announce.dismiss

# ─── Markdown Extensions ──────────────────────────────────────────────────────
markdown_extensions:
  # Standard
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
      toc_depth: 3

  # PyMdown
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: false
  - pymdownx.tilde

# ─── Plugins ──────────────────────────────────────────────────────────────────
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - minify:
      minify_html: true

# ─── Extra Assets ─────────────────────────────────────────────────────────────
extra_css:
  - stylesheets/extra.css

# ─── Extra Config ─────────────────────────────────────────────────────────────
extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MSKazemi/kubeintellect
      name: KubeIntellect on GitHub
    - icon: fontawesome/brands/docker
      link: https://github.com/MSKazemi/kubeintellect/pkgs/container/kubeintellect-release
      name: Docker images on GHCR
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/kube-q/
      name: kube-q CLI on PyPI
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences,
      as well as to measure the effectiveness of our documentation.
      With your consent, you're helping us make the docs better.

# ─── Navigation ───────────────────────────────────────────────────────────────
nav:
  - Home: index.md

  - Getting Started:
    - Installation & Deployment: installation.md
    - Development Setup: development.md
    - Package Management: package-management.md

  - Architecture:
    - System Overview: architecture.md
    - Flowcharts: flowcharts/index.md
    - Multi-User Concurrency: concurrency.md

  - Workflows:
    - Human-in-the-Loop (HITL): hitl.md

  - Operations:
    - Runbook & Troubleshooting: runbook.md
    - Observability Stack: observability.md
    - Secret Management: secret-management.md

  - Security & Privacy:
    - Security Model: security-model.md
    - GDPR & Data Retention: gdpr.md
