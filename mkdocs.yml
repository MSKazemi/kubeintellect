site_name: KubeIntellect
site_description: AI-powered Kubernetes operations assistant
site_url: https://mskazemi.github.io/kubeintellect-v2
repo_url: https://github.com/mskazemi/kubeintellect-v2
repo_name: mskazemi/kubeintellect-v2
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/brand/ki-mark.svg
  favicon: assets/brand/ki-icon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Install:
    - No cluster (quick try): install-pip-no-cluster.md
    - Existing cluster: install-pip-existing-cluster.md
    - Kind cluster (pip): install-pip-kind.md
  - Deploy:
    - Docker Compose: deploy-docker-compose.md
    - Kind (dev env): deploy-kind.md
    - Cloud / VM: deploy-cloud.md
  - Configuration: configuration.md
  - Security: security.md
