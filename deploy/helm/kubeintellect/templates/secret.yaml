apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeintellect.fullname" . }}-secrets
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "kubeintellect.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ── LLM credentials ──────────────────────────────────────────────────────────
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | default "" | quote }}
  OPENAI_COORDINATOR_MODEL: {{ .Values.secrets.openaiCoordinatorModel | default "gpt-4o" | quote }}
  OPENAI_SUBAGENT_MODEL: {{ .Values.secrets.openaiSubagentModel | default "gpt-4o-mini" | quote }}
  AZURE_OPENAI_API_KEY: {{ .Values.secrets.azureOpenaiApiKey | default "" | quote }}
  AZURE_OPENAI_ENDPOINT: {{ .Values.secrets.azureOpenaiEndpoint | default "" | quote }}
  AZURE_COORDINATOR_DEPLOYMENT: {{ .Values.secrets.azureCoordinatorDeployment | default "gpt-4o" | quote }}
  AZURE_SUBAGENT_DEPLOYMENT: {{ .Values.secrets.azureSubagentDeployment | default "gpt-4o-mini" | quote }}
  # ── Database ─────────────────────────────────────────────────────────────────
  {{- if .Values.postgres.external.enabled }}
  DATABASE_URL: {{ .Values.postgres.external.url | quote }}
  {{- else }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s-postgres:5432/%s" .Values.postgres.user .Values.postgres.password (include "kubeintellect.fullname" .) .Values.postgres.database | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  {{- end }}
  # ── Langfuse API keys — set in values-kind.yaml or via --set for prod ────────
  LANGFUSE_PUBLIC_KEY: {{ .Values.secrets.langfusePublicKey | default "" | quote }}
  LANGFUSE_SECRET_KEY: {{ .Values.secrets.langfuseSecretKey | default "" | quote }}
  # ── API key auth — comma-separated keys per role tier (empty = auth disabled) ─
  KUBEINTELLECT_ADMIN_KEYS: {{ .Values.secrets.adminApiKeys | default "" | quote }}
  KUBEINTELLECT_OPERATOR_KEYS: {{ .Values.secrets.operatorApiKeys | default "" | quote }}
  KUBEINTELLECT_READONLY_KEYS: {{ .Values.secrets.readonlyApiKeys | default "" | quote }}
