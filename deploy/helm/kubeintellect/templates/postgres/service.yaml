{{- if not .Values.postgres.external.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: kubeintellect-postgres
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "kubeintellect.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app.kubernetes.io/name: kubeintellect-postgres
{{- end }}
