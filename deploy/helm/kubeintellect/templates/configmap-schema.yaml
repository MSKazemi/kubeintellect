apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubeintellect.fullname" . }}-schema
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "kubeintellect.labels" . | nindent 4 }}
data:
  schema.sql: |
    -- KubeIntellect V2 database schema
    -- Applied by job-db-init on helm install/upgrade

    CREATE TABLE IF NOT EXISTS user_prefs (
        user_id    TEXT NOT NULL,
        key        TEXT NOT NULL,
        value      TEXT NOT NULL,
        updated_at TIMESTAMPTZ NOT NULL DEFAULT now(),
        PRIMARY KEY (user_id, key)
    );

    CREATE TABLE IF NOT EXISTS session_notes (
        id         BIGSERIAL PRIMARY KEY,
        session_id TEXT        NOT NULL,
        note       TEXT        NOT NULL,
        created_at TIMESTAMPTZ NOT NULL DEFAULT now()
    );
    CREATE INDEX IF NOT EXISTS idx_session_notes_session_id ON session_notes (session_id);

    CREATE TABLE IF NOT EXISTS rca_outcomes (
        id               BIGSERIAL PRIMARY KEY,
        session_id       TEXT          NOT NULL,
        user_id          TEXT          NOT NULL,
        root_cause       TEXT          NOT NULL,
        confidence       FLOAT         NOT NULL,
        recommended_fix  TEXT          NOT NULL,
        outcome_feedback TEXT,
        created_at       TIMESTAMPTZ   NOT NULL DEFAULT now()
    );
    CREATE INDEX IF NOT EXISTS idx_rca_outcomes_user_id ON rca_outcomes (user_id, created_at DESC);

    CREATE TABLE IF NOT EXISTS failure_patterns (
        pattern_name     TEXT    PRIMARY KEY,
        description      TEXT    NOT NULL,
        recommended_fix  TEXT    NOT NULL,
        confidence       FLOAT   NOT NULL DEFAULT 0.0,
        occurrence_count INTEGER NOT NULL DEFAULT 0,
        created_at       TIMESTAMPTZ NOT NULL DEFAULT now(),
        updated_at       TIMESTAMPTZ NOT NULL DEFAULT now()
    );

    CREATE TABLE IF NOT EXISTS runbooks (
        id          BIGSERIAL PRIMARY KEY,
        title       TEXT NOT NULL,
        tags        TEXT[] NOT NULL DEFAULT '{}',
        content     TEXT NOT NULL,
        created_at  TIMESTAMPTZ NOT NULL DEFAULT now()
    );
