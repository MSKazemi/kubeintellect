{{- $ns       := include "langfuse.namespace" . }}
{{- $pgPass    := .Values.postgres.password   | default "langfuse" }}
{{- $chPass    := .Values.clickhouse.password | default "langfuse" }}
{{- $minioUser := .Values.minio.rootUser      | default "langfuse" }}
{{- $minioPwd  := .Values.minio.rootPassword  | default "langfuse123" }}
# ─────────────────────────────────────────────────────────────────────────────
# Secret — Langfuse credentials
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secret
  namespace: {{ $ns | quote }}
type: Opaque
stringData:
  DATABASE_URL: {{ printf "postgresql://langfuse:%s@langfuse-postgres:5432/langfuse" $pgPass | quote }}
  NEXTAUTH_URL: {{ .Values.nextauthUrl | default "http://localhost:3000" | quote }}
  NEXTAUTH_SECRET: {{ .Values.nextauthSecret | default "changeme-nextauth-secret-min-32-chars-long" | quote }}
  SALT: {{ .Values.salt | default "changeme-salt-value" | quote }}
  # ENCRYPTION_KEY must be a real 64-character hex string (32 bytes).
  # Generate with: openssl rand -hex 32
  ENCRYPTION_KEY: {{ .Values.encryptionKey | default "36653cf14b2bc0d0158f283af1e50c5401321ddb9850fcd7be7a3417ad950a4f" | quote }}
  CLICKHOUSE_USER: "default"
  CLICKHOUSE_PASSWORD: {{ $chPass | quote }}
  REDIS_HOST: "langfuse-redis"
  REDIS_PORT: "6379"
  LANGFUSE_S3_EVENT_UPLOAD_BUCKET: "langfuse"
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: {{ $minioUser | quote }}
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: {{ $minioPwd | quote }}
  LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: "http://langfuse-minio:9000"
  LANGFUSE_S3_EVENT_UPLOAD_REGION: "us-east-1"
  LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: "langfuse"
  LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: {{ $minioUser | quote }}
  LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: {{ $minioPwd | quote }}
  LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: "http://langfuse-minio:9000"
  LANGFUSE_S3_MEDIA_UPLOAD_REGION: "us-east-1"
  LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
  # Seed: auto-create org / project / API keys / admin user on first startup.
  # Idempotent — safe to re-deploy; existing records are left unchanged.
  LANGFUSE_INIT_ORG_ID: {{ .Values.initOrg.id | default "kubeintellect-org" | quote }}
  LANGFUSE_INIT_ORG_NAME: {{ .Values.initOrg.name | default "KubeIntellect" | quote }}
  LANGFUSE_INIT_PROJECT_ID: {{ .Values.initProject.id | default "kubeintellect-project" | quote }}
  LANGFUSE_INIT_PROJECT_NAME: {{ .Values.initProject.name | default "KubeIntellect" | quote }}
  LANGFUSE_INIT_PROJECT_PUBLIC_KEY: {{ .Values.initProject.publicKey | default "" | quote }}
  LANGFUSE_INIT_PROJECT_SECRET_KEY: {{ .Values.initProject.secretKey | default "" | quote }}
  LANGFUSE_INIT_USER_EMAIL: {{ .Values.initUser.email | default "" | quote }}
  LANGFUSE_INIT_USER_NAME: {{ .Values.initUser.name | default "Admin" | quote }}
  LANGFUSE_INIT_USER_PASSWORD: {{ .Values.initUser.password | default "" | quote }}
