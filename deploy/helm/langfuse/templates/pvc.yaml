{{- $ns := include "langfuse.namespace" . }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-postgres-pvc
  namespace: {{ $ns | quote }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.postgres.storage | default "10Gi" }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-clickhouse-pvc
  namespace: {{ $ns | quote }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.clickhouse.storage | default "30Gi" }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-redis-pvc
  namespace: {{ $ns | quote }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.redis.storage | default "2Gi" }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-minio-pvc
  namespace: {{ $ns | quote }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.minio.storage | default "50Gi" }}
