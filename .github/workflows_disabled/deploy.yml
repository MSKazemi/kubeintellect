name: Build and Deploy

on:
  push:
    branches: [main]      # auto-build on every push — no deploy
  workflow_dispatch:       # manual "Deploy to Production" button

env:
  IMAGE: ghcr.io/mskazemi/kubeintellect-v2

jobs:
  build-and-push:
    name: Build image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false   # prevents multi-manifest attestation layers that break kind load
          tags: |
            ${{ env.IMAGE }}:dev-latest
            ${{ env.IMAGE }}:dev-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'workflow_dispatch'   # only runs when you click the button

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
        with:
          host:     ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key:      ${{ secrets.VM_SSH_KEY }}
          envs:     GHCR_TOKEN,GHCR_ACTOR
          script: |
            set -euo pipefail
            cd ~/KubeIntellectV2-dev

            # Sync code — hard reset to origin/main (gitignored files like .env + values-vm.yaml are safe)
            git fetch origin main
            git reset --hard origin/main

            # Pull image from GHCR into VM host Docker (token valid for this run only)
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            docker pull ghcr.io/mskazemi/kubeintellect-v2:dev-latest
            docker logout ghcr.io

            # Load into Kind (Kind nodes can't reach GHCR directly)
            kind load docker-image ghcr.io/mskazemi/kubeintellect-v2:dev-latest \
              --name testbed-v2

            # Rolling restart — zero downtime
            kubectl rollout restart deployment/kubeintellect -n kubeintellect
            kubectl rollout status deployment/kubeintellect \
              -n kubeintellect --timeout=120s

            # Smoke test — python is always present (it's a Python app image); curl is not
            kubectl exec -n kubeintellect deploy/kubeintellect -- \
              python3 -c "import urllib.request, sys; r=urllib.request.urlopen('http://localhost:8000/healthz'); sys.exit(0 if b'ok' in r.read() else 1)"
            echo "Deploy successful — $(date -u)"
