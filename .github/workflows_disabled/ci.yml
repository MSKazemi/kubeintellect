name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install main deps only — skip dev group (contains a local-path dep for kubeintellect-cli)
      - name: Install dependencies
        run: uv sync --frozen --no-dev

      # Install test + lint tools directly (not via dev group)
      - name: Install test and lint tools
        run: uv pip install pytest pytest-mock ruff

      - name: Lint (ruff)
        run: uv run ruff check app/ tests/

      - name: Test
        run: uv run pytest tests/ --ignore=tests/eval -q
