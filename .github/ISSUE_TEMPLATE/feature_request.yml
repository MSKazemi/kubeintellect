name: Feature Request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or gap you are hitting.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should KubeIntellect do differently?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New agent
        - New static tool on existing agent
        - Supervisor routing
        - HITL / approval flow
        - Observability
        - MCP server
        - Deployment / infrastructure
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: workaround
    attributes:
      label: Current workaround (if any)
