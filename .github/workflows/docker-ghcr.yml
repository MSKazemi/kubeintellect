name: Build and Push Docker Image to GHCR

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read   # checkout
      packages: write  # push to GHCR
      attestations: write
      id-token: write  # OIDC for provenance attestation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Enables BuildKit features: cache mounts, multi-platform, inline cache export
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in when we will actually push (skip on PRs)
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      # Produces canonical tags + OCI labels from git metadata
      #   main  → latest + sha-<short>
      #   dev   → dev    + sha-<short>
      #   PR    → pr-<n> (build-only, not pushed)
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kubeintellect-release
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache — dramatically speeds up repeated builds
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          # Attach SBOM + provenance to the pushed manifest
          sbom:       ${{ github.event_name != 'pull_request' }}
          provenance: ${{ github.event_name != 'pull_request' }}

      # Cryptographically links the image digest to this workflow run
      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name:   ghcr.io/${{ github.repository_owner }}/kubeintellect-release
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
