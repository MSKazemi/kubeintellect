name: Build and Deploy

on:
  push:
    branches: [main]      # build + push on every merge to main
    tags:
      - "v*"              # also on version tags: v2.0.0, v2.1.0, etc.
  workflow_dispatch:       # manual "Deploy to Production" button in GitHub Actions

env:
  IMAGE: ghcr.io/mskazemi/kubeintellect

jobs:
  build-and-push:
    name: Build image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182  # v5.4.1

      # Catch stale or locally-mutated lockfiles before the expensive Docker build.
      # Fails if uv.lock was generated with local editable sources (e.g. kube-q from ../../kube_q)
      # instead of from PyPI.  Fix: run `uv lock --no-sources` locally and commit the result.
      - name: Verify lockfile
        run: uv lock --no-sources --check

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Generate image tags and labels
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # latest on every push to main
            type=raw,value=latest,enable={{is_default_branch}}
            # short SHA for every build — e.g. sha-a1b2c3d
            type=sha,prefix=sha-
            # semver tags for release pushes — e.g. v2.1.0 → 2.1.0, 2.1, 2
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          push: true
          provenance: false   # prevents multi-manifest attestation layers that break kind load
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'workflow_dispatch'   # only runs when you click the button

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          IMAGE_TAG: ghcr.io/mskazemi/kubeintellect:sha-${{ github.sha }}
        with:
          host:     ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key:      ${{ secrets.VM_SSH_KEY }}
          envs:     GHCR_TOKEN,GHCR_ACTOR,IMAGE_TAG
          script: |
            set -euo pipefail
            cd ~/kubeintellect

            # Sync code — hard reset to origin/main
            # gitignored files (.env, values-vm.yaml) are untouched
            git fetch origin main
            git reset --hard origin/main

            # Pull the exact SHA-pinned image so deploys are reproducible
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            docker pull "$IMAGE_TAG"
            docker logout ghcr.io

            # Load into Kind (Kind nodes can't reach GHCR directly)
            kind load docker-image "$IMAGE_TAG" --name kubeintellect

            # Update the running deployment to the new image
            kubectl set image deployment/kubeintellect \
              kubeintellect="$IMAGE_TAG" \
              -n kubeintellect

            # Wait for rollout — fails the workflow if pods don't become ready
            kubectl rollout status deployment/kubeintellect \
              -n kubeintellect --timeout=120s

            # Smoke test — curl is not in the image; python always is
            kubectl exec -n kubeintellect deploy/kubeintellect -- \
              python3 -c "
            import urllib.request, sys
            r = urllib.request.urlopen('http://localhost:8000/healthz')
            sys.exit(0 if b'ok' in r.read() else 1)
            "
            echo "Deploy successful — $(date -u)"
